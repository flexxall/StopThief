<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>1979 Stop Thief Crime Scanner</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="css/scanner.css">
</head>
<body>

<div class="scanner">
    <div class="header-panel">
        <div class="top-labels">
            <div>BLDG.<br>STREET</div>
            <div>LOC.</div>
        </div>
        <div class="brand-text">Electronic<br>Crime Scanner</div>
    </div>

    <div class="display"><div class="led-text" id="screen"></div></div>

    <div class="keypad">
        <button class="btn-1-2" onclick="pressKey('1')">1</button>
        <button class="btn-1-2" onclick="pressKey('2')">2</button>
        <button class="btn-off" onclick="pressOffButton()">OFF</button>

        <button class="btn-3-4" onclick="pressKey('3')">3</button>
        <button class="btn-3-4" onclick="pressKey('4')">4</button>
        <button class="btn-on" onclick="pressOnButton()">ON</button>

        <button class="btn-5-6" onclick="pressKey('5')">5</button>
        <button class="btn-5-6" onclick="pressKey('6')">6</button>

        <button class="btn-t"
                onmousedown="showTip()" onmouseup="hideTip()" onmouseleave="hideTip()"
                ontouchstart="event.preventDefault(); showTip()" ontouchend="event.preventDefault(); hideTip()">
            T<span class="sub-label">Tip</span>
        </button>

        <button class="btn-purple" onclick="pressKey('7')">7</button>
        <button class="btn-purple" onclick="pressKey('8')">8</button>
        <button class="btn-a" onclick="startArrest()">A<span class="sub-label">Arrest</span></button>

        <button class="btn-9-0" onclick="pressKey('9')">9</button>
        <button class="btn-9-0" onclick="pressKey('0')">0</button>
        <button class="btn-c" onclick="getClue()">C<span class="sub-label">Clue</span></button>
    </div>
</div>

<script src="lib/sound.js"></script>
<script src="js/game-state.js"></script>
<script src="js/board-data.js"></script>
<script src="js/movement-engine.js"></script>
<script src="js/audio.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
